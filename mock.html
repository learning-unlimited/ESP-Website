<!DOCTYPE html>
<html>
<head>
<title>ESP Calendar Mock</title>
<link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css' rel='stylesheet' />
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body { font-family: 'Inter', sans-serif; background: #f8f9fa; padding: 40px; }
    #calendar {
        max-width: 900px;
        margin: 20px auto;
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .fc-event { cursor: pointer; }
    .status-mine { background-color: #28a745 !important; border-color: #28a745 !important; }
    .status-full { background-color: #dc3545 !important; border-color: #dc3545 !important; opacity: 0.6; }
    .status-past { background-color: #6c757d !important; border-color: #6c757d !important; opacity: 0.5; }
    .status-available { background-color: #3788d8 !important; border-color: #3788d8 !important; }
    .fc-event-title { font-weight: bold; padding: 4px; }
</style>
</head>
<body>
<div class="container text-center">
    <h1 class="mb-4">Teacher Preparation Events for Splash 2026_Fall</h1>
    <p>Please select your preferred timeslots from the calendar below.</p>
    <div id='calendar'></div>
</div>
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js'></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');
        
        // Create dates relative to today for the mockup
        var date = new Date();
        var d = date.getDate();
        var m = date.getMonth();
        var y = date.getFullYear();

        var calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'timeGridWeek',
            contentHeight: 'auto',
            allDaySlot: false,
            slotMinTime: '08:00:00',
            slotMaxTime: '18:00:00',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'timeGridWeek,timeGridDay'
            },
            events: [
                { id: 1, title: 'Interview: Fall Intro', start: new Date(y, m, d-2, 10, 0), end: new Date(y, m, d-2, 11, 0), className: 'status-past' },
                { id: 2, title: 'Training: Safety', start: new Date(y, m, d, 14, 0), end: new Date(y, m, d, 16, 0), className: 'status-available' },
                { id: 3, title: 'Interview: Priority', start: new Date(y, m, d+1, 9, 0), end: new Date(y, m, d+1, 10, 0), className: 'status-full' },
                { id: 4, title: 'Training: Welcome', start: new Date(y, m, d+2, 13, 0), end: new Date(y, m, d+2, 15, 0), className: 'status-mine' }
            ]
        });
        calendar.render();
    });
</script>
</body>
</html>

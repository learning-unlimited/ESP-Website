name: Label High-Volume PR Contributors

on:
  schedule:
    - cron: '0 9 * * *'  # Every day at 9:00 AM UTC
  workflow_dispatch:        # Allow manual runs

jobs:
  label-high-volume-prs:
    runs-on: ubuntu-latest
    steps:
      - name: Add or remove labels based on open PR count
        uses: actions/github-script@v7
        with:
          script: |
            const maxOpenPRs = 10;
            const labelName = 'too-many-open-prs';
            const labelColor = 'e11d48';
            const labelDescription = 'Author has more than 10 open PRs in this repo';

            // Ensure the label exists
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: labelName
              });
            } catch {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: labelName,
                color: labelColor,
                description: labelDescription
              });
              core.info(`Created label "${labelName}"`);
            }

            // Fetch all open PRs
            const openPRs = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            // Group PRs by author
            const prsByAuthor = {};
            for (const pr of openPRs) {
              const author = pr.user.login;
              if (!prsByAuthor[author]) prsByAuthor[author] = [];
              prsByAuthor[author].push(pr);
            }

            // Add or remove labels as needed
            for (const [author, prs] of Object.entries(prsByAuthor)) {
              const overLimit = prs.length > maxOpenPRs;

              for (const pr of prs) {
                const hasLabel = pr.labels.some(l => l.name === labelName);

                if (overLimit && !hasLabel) {
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: pr.number,
                    labels: [labelName]
                  });
                  core.info(`Added label to PR #${pr.number} (${author}: ${prs.length} open)`);
                } else if (!overLimit && hasLabel) {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: pr.number,
                    name: labelName
                  });
                  core.info(`Removed label from PR #${pr.number} (${author}: ${prs.length} open)`);
                }
              }
            }

            core.info('Done. PR label check complete.');

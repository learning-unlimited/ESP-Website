name: Cleanup PR Caches

on:
  pull_request:
    types:
      - closed

permissions:
  actions: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Cleanup
        run: |
          ## Setting this to not fail the workflow while listing and deleting cache keys.
          set +e
          echo "Fetching list of cache IDs"
          cacheIdsForPR=$(gh cache list --ref $BRANCH --limit 100 --json id --jq '.[].id' || echo "")

          echo "Deleting caches..."
          for cacheId in $cacheIdsForPR
          do
              gh cache delete $cacheId
          done
          echo "Done"
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          BRANCH: refs/pull/${{ github.event.pull_request.number }}/merge

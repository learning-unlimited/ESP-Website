name: Enforce PR Assignment

on:
  pull_request_target:
    types: [opened, reopened, edited, synchronize]

permissions:
  pull-requests: write
  issues: write

jobs:
  check-assignment:
    runs-on: ubuntu-latest
    steps:
      - name: Check issue assignment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const prAuthor = pr.user.login;
            const prNumber = pr.number;
            const prState = pr.state;
            const body = pr.body || '';
            // Strip HTML comments so PR template hints don't trigger the check
            const cleanBody = body.replace(/<!--[\s\S]*?-->/g, '');

            console.log(`Checking PR #${prNumber} by @${prAuthor} (state: ${prState})`);

            // Skip redundant re-checks on open PRs that were merely edited
            const action = context.payload.action;
            if (action === 'edited' && prState === 'open') {
              console.log('PR is already open and was only edited — skipping redundant check.');
              return;
            }

            // Check if the PR author is an admin or maintainer (exempt)
            let permission = 'none';
            try {
              const { data: permissionLevel } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: prAuthor,
              });
              permission = permissionLevel.permission;
              console.log(`@${prAuthor} has '${permission}' permission`);
            } catch (error) {
              if (error && error.status === 404) {
                console.log(`@${prAuthor} is not a collaborator; treating as non-admin (permission='none').`);
              } else {
                throw error;
              }
            }

            if (permission === 'admin' || permission === 'maintain') {
              console.log('PR author is admin/maintainer — skipping check.');
              return;
            }

            // Extract issue numbers from the PR body
            // Matches: Closes #123, Fixes #456, Resolves #789 (case-insensitive)
            const issuePattern = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi;
            const issueNumbers = [];
            let match;
            while ((match = issuePattern.exec(cleanBody)) !== null) {
              issueNumbers.push(parseInt(match[1], 10));
            }

            if (issueNumbers.length === 0) {
              // Only close and comment if the PR is currently open
              if (prState === 'open') {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: `👋 Hi @${prAuthor}, thanks for your interest in contributing!\n\nThis PR doesn't appear to link to any issue. All PRs must reference an issue using a keyword like "Closes #123" in the PR description.\n\nPlease:\n1. Find or create an issue for the work you're doing\n2. Comment on the issue asking to be assigned\n3. Wait for a maintainer to assign you\n4. Update this PR's description to link the issue\n\nOnce you've updated the description, this workflow will automatically recheck and reopen the PR if everything looks good. 🙌`,
                });

                await github.rest.pulls.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  state: 'closed',
                });

                console.log(`Closed PR #${prNumber} — no linked issues found.`);
              } else {
                console.log(`PR #${prNumber} is already closed and still has no linked issues — skipping.`);
              }
              return;
            }

            console.log(`Found linked issues: ${issueNumbers.join(', ')}`);

            // Check each linked issue for assignees
            let allChecksPassed = true;

            for (const issueNumber of issueNumbers) {
              let issue;
              try {
                const { data } = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                });
                issue = data;
              } catch (error) {
                console.log(`Could not fetch issue #${issueNumber} — skipping.`);
                continue;
              }

              const assignees = issue.assignees.map(a => a.login);

              if (assignees.length === 0) {
                allChecksPassed = false;

                if (prState === 'open') {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: prNumber,
                    body: `👋 Hi @${prAuthor}, thanks for your interest in contributing!\n\nHowever, issue #${issueNumber} is not yet assigned to anyone. To avoid duplicate work, this PR has been automatically closed.\n\nPlease:\n1. Comment on the issue asking to be assigned\n2. Wait for a maintainer to assign you\n3. Update this PR's description if needed\n\nOnce you're assigned, this workflow will automatically recheck and reopen the PR. 🙌`,
                  });

                  await github.rest.pulls.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: prNumber,
                    state: 'closed',
                  });

                  console.log(`Closed PR #${prNumber} — issue #${issueNumber} is unassigned.`);
                } else {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: prNumber,
                    body: `👋 Hi @${prAuthor}, issue #${issueNumber} is still not assigned to anyone. Please comment on the issue asking to be assigned, and once a maintainer assigns you, this workflow will automatically reopen the PR. 🙌`,
                  });

                  console.log(`Commented on closed PR #${prNumber} — issue #${issueNumber} is still unassigned.`);
                }
                return;
              }

              console.log(`Issue #${issueNumber} is assigned to: ${assignees.join(', ')}`);

              if (!assignees.includes(prAuthor)) {
                allChecksPassed = false;
                const assigneeMentions = assignees.map(a => `@${a}`).join(', ');

                if (prState === 'open') {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: prNumber,
                    body: `👋 Hi @${prAuthor}, thanks for your interest in contributing!\n\nHowever, issue #${issueNumber} is currently assigned to ${assigneeMentions}. To avoid duplicate work, this PR has been automatically closed.\n\nIf you'd like to work on this issue, please:\n1. Comment on the issue asking to be assigned\n2. Wait for a maintainer to assign you\n3. Update this PR's description if needed\n\nOnce you're assigned, this workflow will automatically recheck and reopen the PR. 🙌`,
                  });

                  await github.rest.pulls.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: prNumber,
                    state: 'closed',
                  });

                  console.log(`Closed PR #${prNumber} — author is not an assignee of issue #${issueNumber}.`);
                } else {
                  const assigneeMentionsMsg = assignees.map(a => `@${a}`).join(', ');
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: prNumber,
                    body: `👋 Hi @${prAuthor}, issue #${issueNumber} is still assigned to ${assigneeMentionsMsg} and not to you. Please comment on the issue asking to be assigned, and once a maintainer assigns you, this workflow will automatically reopen the PR. 🙌`,
                  });

                  console.log(`Commented on closed PR #${prNumber} — author still not assigned to issue #${issueNumber}.`);
                }
                return;
              }

              console.log(`@${prAuthor} is an assignee of issue #${issueNumber} — allowed.`);
            }

            // All checks passed — reopen if the PR was previously closed
            if (allChecksPassed && prState === 'closed') {
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                state: 'open',
              });

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `🎉 Great news @${prAuthor}! Your PR has been automatically reopened — you're properly assigned to the linked issue(s). Thanks for following the contribution process!`,
              });

              console.log(`Reopened PR #${prNumber} — all assignment checks now pass.`);
            } else if (allChecksPassed) {
              console.log('All checks passed — PR is allowed.');
            }

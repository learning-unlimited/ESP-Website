						<button class="btn btn-inverse" id="darkModeToggle" aria-label="Toggle Dark Mode"
							style="margin-top: 5px; margin-right: 15px;">
							<i id="themeIcon" class="icon-adjust icon-white"></i> Theme
						</button>
						<script>
							document.addEventListener("DOMContentLoaded", function () {
								var toggleBtn = document.getElementById("darkModeToggle");
								if (toggleBtn) {
									toggleBtn.addEventListener("click", function (e) {
										e.preventDefault();
										window.ESPThemeEngine.toggleTheme();
										document.body.classList.add('theme-transition');
										setTimeout(function () { document.body.classList.remove('theme-transition'); }, 300);
									});
								}
							});
						</script>

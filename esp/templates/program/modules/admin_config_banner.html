{% if show_banner %}
<div class="admin-config-banner no-print" role="note" aria-label="Admin configuration link">
    <span class="glyphicon glyphicon-wrench" aria-hidden="true"></span>
    <strong> Admin:</strong>
    <a href="{{ config_url }}">{{ link_text }}</a>
</div>

<style>
.admin-config-banner {
    background-color: #fff8e1;
    border-left: 4px solid #f0ad4e;
    padding: 10px 16px;
    margin-bottom: 14px;
    font-size: 0.92em;
    border-radius: 2px;
}
.admin-config-banner a {
    color: #c0392b;
    font-weight: bold;
    text-decoration: underline;
}
.admin-config-banner a:hover {
    color: #922b21;
}
@media print {
    .no-print { display: none !important; }
}
</style>
{% endif %}

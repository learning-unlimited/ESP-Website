{% extends "program/modules/module_base.html" %}

{% block title %}Class Conflict{% endblock %}

{% block module_content %}
<div style="text-align: center; margin-top: 50px; padding: 20px;">
    <h2>Class Conflict</h2>
    <p style="font-size: 1.2em;"><b>{{ confirm_msg }}</b></p>
    <form method="post" action="{{ prereg_url }}" style="margin-top: 20px; display: inline-block;">
        {% csrf_token %}
        <input type="hidden" name="class_id" value="{{ class_id }}" />
        <input type="hidden" name="section_id" value="{{ section_id }}" />
        <input type="hidden" name="force_replace" value="true" />
        <button type="submit" class="btn" style="background-color: #d9534f; color: white; margin-right: 10px; padding: 10px 15px; border-radius: 5px; border: none; cursor: pointer;">Yes, replace class</button>
        <a href="javascript:history.back()" class="btn" style="background-color: #5bc0de; color: white; text-decoration: none; padding: 10px 15px; border-radius: 5px; border: none; display: inline-block;">Cancel</a>
    </form>
</div>
{% endblock %}

{% extends "program/modules/onsitecore/onsitebase.html" %}

{% block title %}Onsite Admin Dashboard{% endblock %}

{% block content %}
<style>
.admin-onsite-wrap { max-width: 1200px; margin: 0 auto; }
.admin-onsite-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.admin-onsite-stats { display: grid; grid-template-columns: repeat(3, minmax(120px, 1fr)); gap: 12px; margin-bottom: 16px; }
.admin-onsite-card { background: #f5f8fb; border: 1px solid #d5e0eb; border-radius: 6px; padding: 12px; }
.admin-onsite-label { font-size: 12px; text-transform: uppercase; color: #506070; }
.admin-onsite-value { font-size: 24px; font-weight: 700; color: #1a2d45; }
.admin-onsite-table { width: 100%; border-collapse: collapse; }
.admin-onsite-table th, .admin-onsite-table td { border-bottom: 1px solid #dde4eb; padding: 8px; text-align: left; }
.admin-onsite-pill { border-radius: 999px; padding: 2px 10px; font-size: 11px; font-weight: 700; display: inline-block; }
.admin-onsite-open { background: #def8e9; color: #15653a; }
.admin-onsite-closed { background: #fbe4e4; color: #8c2020; }
@media (max-width: 900px) {
  .admin-onsite-stats { grid-template-columns: 1fr; }
}
</style>

<div class="admin-onsite-wrap">
  <div class="admin-onsite-header">
    <h1>Onsite Admin Dashboard</h1>
    <div id="admin-onsite-last-update">Loading...</div>
  </div>

  <div class="admin-onsite-stats">
    <div class="admin-onsite-card">
      <div class="admin-onsite-label">Classes</div>
      <div class="admin-onsite-value" id="stat-classes">0</div>
    </div>
    <div class="admin-onsite-card">
      <div class="admin-onsite-label">Registered</div>
      <div class="admin-onsite-value" id="stat-enrolled">0</div>
    </div>
    <div class="admin-onsite-card">
      <div class="admin-onsite-label">Checked In</div>
      <div class="admin-onsite-value" id="stat-checkins">0</div>
    </div>
  </div>

  <table class="admin-onsite-table">
    <thead>
      <tr>
        <th>Code</th>
        <th>Class</th>
        <th>Teacher(s)</th>
        <th>Room(s)</th>
        <th>Reg</th>
        <th>Enrolled</th>
        <th>Checked In</th>
        <th>Capacity</th>
      </tr>
    </thead>
    <tbody id="admin-onsite-rows"></tbody>
  </table>
</div>

<script>
(function () {
  function escapeHtml(text) {
    return String(text || '').replace(/[&<>"]/g, function(c) {
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];
    });
  }

  function renderRows(classes) {
    var tbody = document.getElementById('admin-onsite-rows');
    if (!classes || classes.length === 0) {
      tbody.innerHTML = '<tr><td colspan="8">No active classes found.</td></tr>';
      return;
    }

    var rows = [];
    for (var i = 0; i < classes.length; i++) {
      var c = classes[i];
      var regClass = c.registration_open ? 'admin-onsite-open' : 'admin-onsite-closed';
      var regText = c.registration_open ? 'Open' : 'Closed';
      rows.push(
        '<tr>' +
          '<td>' + escapeHtml(c.emailcode) + '</td>' +
          '<td>' + escapeHtml(c.title) + '</td>' +
          '<td>' + escapeHtml(c.teachers) + '</td>' +
          '<td>' + escapeHtml(c.rooms) + '</td>' +
          '<td><span class="admin-onsite-pill ' + regClass + '">' + regText + '</span></td>' +
          '<td>' + escapeHtml(c.enrolled) + '</td>' +
          '<td>' + escapeHtml(c.checkins) + '</td>' +
          '<td>' + escapeHtml(c.capacity) + '</td>' +
        '</tr>'
      );
    }
    tbody.innerHTML = rows.join('');
  }

  function updateStats(stats) {
    document.getElementById('stat-classes').innerHTML = stats.total_classes || 0;
    document.getElementById('stat-enrolled').innerHTML = stats.enrolled_total || 0;
    document.getElementById('stat-checkins').innerHTML = stats.checkins_total || 0;
  }

  function stampUpdate() {
    var now = new Date();
    document.getElementById('admin-onsite-last-update').innerHTML = 'Updated ' + now.toLocaleTimeString();
  }

  function loadData() {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '{{ one }}/{{ two }}/onsite_admin_data', true);
    xhr.onreadystatechange = function () {
      if (xhr.readyState === 4 && xhr.status === 200) {
        try {
          var data = JSON.parse(xhr.responseText);
          updateStats(data.stats || {});
          renderRows(data.classes || []);
          stampUpdate();
        } catch (err) {
          document.getElementById('admin-onsite-last-update').innerHTML = 'Update failed';
        }
      }
    };
    xhr.send();
  }

  loadData();
  setInterval(loadData, {{ refresh_seconds|default:12 }} * 1000);
})();
</script>
{% endblock %}

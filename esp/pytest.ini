[pytest]
django_find_project = false
pythonpath = .
DJANGO_SETTINGS_MODULE = esp.test_settings

# Match test file naming conventions:
#   test_*.py             — standardized test file prefix
#   *_tests.py            — conventional suffix pattern
python_files = test_*.py *_tests.py
python_classes = Test* *Test
python_functions = test_*

# --strict-markers: unknown @pytest.mark.* decorators become errors
# -rs: every run surfaces skip reasons
# --reuse-db: skip migrations on subsequent runs (use --create-db when migrations change)
addopts = --strict-markers -rs --reuse-db
markers =
    selenium: marks tests as selenium integration tests (deselect with '-m "not selenium"')

# Third-party packages emit DeprecationWarnings we cannot act on.
# Suppress all deprecation/pending-deprecation warnings to keep output
# readable. To audit them, run: pytest -W default::DeprecationWarning
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::django.core.cache.backends.base.CacheKeyWarning
    ignore:_SixMetaPathImporter.find_spec.*:ImportWarning
    

<ul class="navbar-nav admin hidden">
  <li class="nav-item dropdown">
    <div class="nav-link dropdown-split">
      <a class="navbar-item-label" data-toggle="dropdown">Admin Toolbar</a>
      <a class="dropdown-toggle caret-wrapper" data-toggle="dropdown" aria-label="Admin menu"><b class="caret"></b></a>
    </div>
    <ul class="dropdown-menu">
      {% comment %} === Admin Toolbar (includes user search) === {% endcomment %}
      {% load modules %}
      <link rel="stylesheet" type="text/css" href="/media/styles/admin_bar.css">
      <div class="admin hidden">
        <div id="adminbar_content"></div>
      </div>
      {{ theme.toolbar_links|json_script:"toolbar-links-data" }}
      <script type="text/javascript">
      var currentPrograms = [
      {% for current_program in current_programs %}
          {
              urlBase: "{{ current_program.getUrlBase }}",
              name: "{{ current_program.niceName }}",
              class_search: {% if current_program|hasModule:"ClassSearchModule" %}true{% else %}false{% endif %}
          },
      {% endfor %}
      ];
      var debug = {{ settings.DEBUG|yesno:"true,false" }};
      var rawToolbarLinks = JSON.parse(document.getElementById('toolbar-links-data').textContent);
      var toolbarLinks = Array.isArray(rawToolbarLinks) ? rawToolbarLinks : [];
      </script>
      <script type="text/javascript" src="/media/scripts/theme/admin_bar.js"> </script>
      {% comment %} === End Admin Toolbar === {% endcomment %}
    </ul>
  </li>
</ul>
<ul class="navbar-nav unmorph hidden">
  <li class="nav-item">
    <a class="nav-link" href="/myesp/switchback/">
      <i class="bi bi-person"></i> Unmorph to <span class="unmorph-target-name"></span>
    </a>
  </li>
</ul>
<script type="text/javascript">
  (function () {
    var el = document.querySelector('.unmorph-target-name');
    var unmorphNav = document.querySelector('.navbar-nav.unmorph');
    if (el && typeof esp_user !== 'undefined' && esp_user.cur_retTitle) {
      el.textContent = esp_user.cur_retTitle;
      if (unmorphNav) {
        unmorphNav.classList.remove('hidden');
      }
    }
  })();
</script>
